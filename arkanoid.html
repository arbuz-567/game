<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Арканоид</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; text-align: center; }
        canvas { border: 3px solid #e94560; background: #000; }
        .controls { margin-top: 15px; }
        .controls span { margin: 0 10px; color: #888; }
        a { color: #e94560; }
    </style>
</head>
<body>
    <h1>Арканоид</h1>
    <div>Счёт: <span id="score">0</span></div>
    <canvas id="c" width="480" height="320"></canvas>
    <div class="controls">
        <span>Стрелки - движение платформы</span>
        <span>Enter - старт</span>
    </div>
    <p><a href="index.html">Назад</a></p>

    <script>
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        const pw = 80, ph = 12, br = 8;
        const brickW = 50, brickH = 18, brickPad = 5;
        const brickRows = 5, brickCols = 8;
        
        let score = 0;
        let running = false;
        let timer;
        
        let paddle = { x: 200 };
        let ball = { x: 240, y: 300, dx: 3, dy: -3 };
        let bricks = [];
        
        function init() {
            bricks = [];
            for (let r = 0; r < brickRows; r++) {
                bricks[r] = [];
                for (let cl = 0; cl < brickCols; cl++) {
                    bricks[r][cl] = 1;
                }
            }
            score = 0;
            document.getElementById('score').textContent = 0;
            paddle.x = 200;
            ball.x = 240;
            ball.y = 300;
            ball.dx = 3;
            ball.dy = -3;
        }
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0,0,c.width,c.height);
            
            let colors = ['#e94560','#ff6b6b','#4ecdc4','#45b7d1','#96ceb4'];
            for (let r = 0; r < brickRows; r++) {
                for (let cl = 0; cl < brickCols; cl++) {
                    if (bricks[r][cl]) {
                        ctx.fillStyle = colors[r];
                        let bx = cl * (brickW + brickPad) + 25;
                        let by = r * (brickH + brickPad) + 30;
                        ctx.fillRect(bx, by, brickW, brickH);
                    }
                }
            }
            
            ctx.fillStyle = '#e94560';
            ctx.fillRect(paddle.x, 298, pw, ph);
            
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, br, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.closePath();
        }
        
        function update() {
            if (!running) return;
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            if (ball.x + br > c.width || ball.x - br < 0) ball.dx = -ball.dx;
            if (ball.y - br < 0) ball.dy = -ball.dy;
            
            if (ball.y + br > 310 && ball.x > paddle.x && ball.x < paddle.x + pw) {
                ball.dy = -Math.abs(ball.dy);
                ball.dx = (ball.x - paddle.x - pw/2) * 0.15;
            }
            
            for (let r = 0; r < brickRows; r++) {
                for (let cl = 0; cl < brickCols; cl++) {
                    if (bricks[r][cl]) {
                        let bx = cl * (brickW + brickPad) + 25;
                        let by = r * (brickH + brickPad) + 30;
                        if (ball.x > bx && ball.x < bx + brickW && ball.y > by && ball.y < by + brickH) {
                            bricks[r][cl] = 0;
                            ball.dy = -ball.dy;
                            score += 10;
                            document.getElementById('score').textContent = score;
                        }
                    }
                }
            }
            
            if (ball.y > c.height) {
                running = false;
                clearInterval(timer);
                alert('Игра окончена! Счёт: ' + score);
            }
        }
        
        function loop() {
            update();
            draw();
        }
        
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                running = !running;
                if (running) timer = setInterval(loop, 16);
                return;
            }
            if (!running) return;
            if (e.key === 'ArrowLeft' && paddle.x > 0) paddle.x -= 8;
            if (e.key === 'ArrowRight' && paddle.x < c.width - pw) paddle.x += 8;
            draw();
        });
        
        init();
        draw();
    </script>
</body>
</html>
