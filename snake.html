<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Змейка</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; text-align: center; }
        canvas { border: 3px solid #e94560; background: #000; }
        .controls { margin-top: 15px; }
        .controls span { margin: 0 10px; color: #888; }
        a { color: #e94560; }
    </style>
</head>
<body>
    <h1>Змейка</h1>
    <div>Счёт: <span id="score">0</span></div>
    <canvas id="c" width="400" height="400"></canvas>
    <div class="controls">
        <span>Стрелки - движение</span>
        <span>Enter - старт/пауза</span>
    </div>
    <p><a href="index.html">Назад</a></p>

    <script>
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        const size = 20;
        const count = c.width / size;
        
        let snake = [{x:10,y:10}];
        let dir = {x:0,y:0};
        let food = {x:15,y:15};
        let score = 0;
        let running = false;
        let timer;
        
        document.getElementById('score').textContent = score;
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle = '#e94560';
            snake.forEach(p => ctx.fillRect(p.x*size, p.y*size, size-2, size-2));
            ctx.fillStyle = '#0f0';
            ctx.fillRect(food.x*size, food.y*size, size-2, size-2);
        }
        
        function update() {
            if (!running) return;
            const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
            if (head.x < 0 || head.x >= count || head.y < 0 || head.y >= count) { stopGame(); return; }
            for (let p of snake) if (p.x === head.x && p.y === head.y) { stopGame(); return; }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                placeFood();
            } else {
                snake.pop();
            }
        }
        
        function placeFood() {
            food.x = Math.floor(Math.random() * count);
            food.y = Math.floor(Math.random() * count);
        }
        
        function stopGame() {
            running = false;
            clearInterval(timer);
            alert('Игра окончена! Счёт: ' + score);
        }
        
        function loop() {
            update();
            draw();
        }
        
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                running = !running;
                if (running) timer = setInterval(loop, 100);
                return;
            }
            if (!running) return;
            if (e.key === 'ArrowLeft' && dir.x !== 1) dir = {x:-1,y:0};
            if (e.key === 'ArrowRight' && dir.x !== -1) dir = {x:1,y:0};
            if (e.key === 'ArrowUp' && dir.y !== 1) dir = {x:0,y:-1};
            if (e.key === 'ArrowDown' && dir.y !== -1) dir = {x:0,y:1};
        });
        
        draw();
    </script>
</body>
</html>
